<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="ui">
    <div id="ui-left">
      <div class="ui-label">MISTAKES</div>
      <div id="mistakesEl">0 / 3</div>
    </div>
    <div id="titleEl">SUDOKU</div>
    <div id="ui-right">
      <div class="ui-label">TIME</div>
      <div id="timeEl">00:00</div>
    </div>
  </div>

  <div id="diffBar">
    <button class="diff active" data-d="easy">Easy</button>
    <button class="diff" data-d="medium">Medium</button>
    <button class="diff" data-d="hard">Hard</button>
  </div>

  <div id="boardWrap">
    <div id="board"></div>
    <div id="overlay">
      <div id="msg">SUDOKU</div>
      <div id="sub">Fill the grid so every row,<br>column and 3×3 box has 1–9</div>
      <button id="startBtn">New Game ▶</button>
    </div>
  </div>

  <div id="numpad"></div>
  <div id="actions">
    <button class="action-btn" id="eraseBtn"><span>✕</span> Erase</button>
    <button class="action-btn" id="noteBtn"><span>✎</span> Notes</button>
    <button class="action-btn" id="hintBtn"><span>💡</span> Hint</button>
  </div>
  <div id="hint">Click a cell then tap a number · Mistakes allowed: 3</div>

  <script src="script.js"></script>
</body>
</html>
