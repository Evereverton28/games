<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DINO RUN</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>DINO RUN</h1>

    <div class="hud">
      <div class="score-card" id="score-card">
        <span class="score-label">SCORE</span>
        <span class="score-value" id="score-display">00000</span>
      </div>
      <div class="score-card">
        <span class="score-label">HIGH</span>
        <span class="score-value" id="hi-display">00000</span>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="900" height="280"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlay-title">DINO RUN</div>
        <div class="overlay-sub" id="overlay-sub">PRESS SPACE OR TAP TO START</div>
        <button id="start-btn">START GAME</button>
      </div>
    </div>

    <p class="hint">SPACE / ↑ / TAP — JUMP &nbsp;|&nbsp; ↓ — DUCK</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
