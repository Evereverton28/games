<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui">
    <div>Score <span id="scoreEl">0</span></div>
    <div>Best <span id="highEl">0</span></div>
    <div>Lives <span id="livesEl">❤️❤️❤️</span></div>
  </div>
  <div id="wrap">
    <canvas id="gc"></canvas>
    <div id="overlay">
      <div id="msg">Breakout</div>
      <div id="sub">Arrow keys or mouse to move · P to pause</div>
      <button id="startBtn" onclick="startGame()">Start game ▶</button>
    </div>
  </div>
  <div id="pauseHint"></div>
  <script src="script.js"></script>
</body>
</html>
